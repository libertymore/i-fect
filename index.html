<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Закрыто</title>
  <style>
    :root {
      --bg-1: #050816;
      --bg-2: #0a1026;
      --text: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.7);
      --glass: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.14);
      --glow-a: 120, 180, 255;
      --glow-b: 170, 120, 255;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(70,120,255,0.18), transparent 30%),
        radial-gradient(circle at 80% 30%, rgba(170,120,255,0.14), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(120,220,255,0.10), transparent 30%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      cursor: crosshair;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
    }

    .noise,
    .vignette,
    .cursor-glow,
    .nebula {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .noise {
      z-index: 1;
      opacity: 0.045;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.7) 0.5px, transparent 0.8px),
        radial-gradient(circle at 80% 60%, rgba(255,255,255,0.5) 0.5px, transparent 0.9px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.45) 0.5px, transparent 1px);
      background-size: 180px 180px, 220px 220px, 260px 260px;
      mix-blend-mode: screen;
      animation: driftNoise 18s linear infinite;
    }

    .nebula {
      z-index: 1;
      background:
        radial-gradient(600px 400px at var(--mx, 50%) var(--my, 50%), rgba(120, 180, 255, 0.13), transparent 55%),
        radial-gradient(500px 300px at calc(100% - var(--mx, 50%)) calc(100% - var(--my, 50%)), rgba(170, 120, 255, 0.12), transparent 50%);
      filter: blur(24px);
      transition: background-position 0.12s linear;
    }

    .cursor-glow {
      z-index: 2;
      background:
        radial-gradient(320px 320px at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.07), transparent 45%),
        radial-gradient(520px 520px at var(--mx, 50%) var(--my, 50%), rgba(var(--glow-a),0.10), transparent 40%),
        radial-gradient(780px 780px at var(--mx, 50%) var(--my, 50%), rgba(var(--glow-b),0.08), transparent 30%);
      mix-blend-mode: screen;
    }

    .vignette {
      z-index: 3;
      background: radial-gradient(circle at center, transparent 35%, rgba(0,0,0,0.48) 100%);
    }

    .wrap {
      position: relative;
      z-index: 4;
      padding: 24px;
      width: min(92vw, 980px);
    }

    .panel {
      position: relative;
      padding: clamp(28px, 4vw, 56px);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
      border: 1px solid var(--border);
      box-shadow:
        0 24px 80px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 0 40px rgba(120,180,255,0.10);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.15s ease-out, box-shadow 0.2s ease-out;
    }

    .panel::before,
    .panel::after {
      content: "";
      position: absolute;
      inset: auto;
      border-radius: 999px;
      filter: blur(50px);
      opacity: 0.45;
      pointer-events: none;
    }

    .panel::before {
      width: 220px;
      height: 220px;
      top: -70px;
      left: -60px;
      background: rgba(120, 180, 255, 0.22);
    }

    .panel::after {
      width: 240px;
      height: 240px;
      right: -60px;
      bottom: -90px;
      background: rgba(170, 120, 255, 0.16);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      backdrop-filter: blur(10px);
      margin-bottom: 22px;
    }

    .tag::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0%, #93b8ff 50%, #6f82ff 100%);
      box-shadow: 0 0 14px rgba(147,184,255,0.8);
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 7vw, 84px);
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.04em;
      text-wrap: balance;
      text-shadow: 0 0 30px rgba(255,255,255,0.08), 0 0 60px rgba(110,150,255,0.18);
    }

    h1 .accent {
      display: block;
      color: rgba(255,255,255,0.88);
      background: linear-gradient(90deg, rgba(255,255,255,0.98), rgba(177,205,255,0.92), rgba(221,204,255,0.96));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      margin: 20px 0 0;
      max-width: 760px;
      color: var(--muted);
      font-size: clamp(15px, 2vw, 20px);
      line-height: 1.65;
    }

    .stars-top {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .stars-top span {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 12px rgba(255,255,255,0.8);
      animation: blink linear infinite;
      opacity: 0.75;
    }

    .footer-note {
      margin-top: 28px;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    @keyframes blink {
      0%, 100% { transform: scale(0.9); opacity: 0.45; }
      50% { transform: scale(1.8); opacity: 1; }
    }

    @keyframes driftNoise {
      from { transform: translate3d(0,0,0); }
      50% { transform: translate3d(-10px, 8px, 0); }
      to { transform: translate3d(0,0,0); }
    }

    @media (max-width: 640px) {
      .wrap { width: min(94vw, 980px); }
      .panel { border-radius: 22px; }
      p { line-height: 1.55; }
    }
  </style>
</head>
<body>
  <canvas id="space"></canvas>
  <div class="noise"></div>
  <div class="nebula"></div>
  <div class="cursor-glow"></div>
  <div class="vignette"></div>

  <main class="wrap">
    <section class="panel" id="panel">
      <div class="stars-top" id="starsTop"></div>
      <div class="tag">И. Фект Бьюти</div>
      <h1>
        Закрыто.<br />
        <span class="accent">Всем спасибо, кто был с нами</span>
      </h1>
      <p>
        Этот проект завершён. Всё хорошее остаётся в памяти — люди, поддержка, внимание и время, которое вы были рядом.
      </p>
      <div class="footer-note">thank you for the orbit</div>
    </section>
  </main>

  <script>
    const root = document.documentElement;
    const canvas = document.getElementById('space');
    const ctx = canvas.getContext('2d');
    const panel = document.getElementById('panel');
    const starsTop = document.getElementById('starsTop');

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    let cx = w / 2;
    let cy = h / 2;

    const mouse = {
      x: w / 2,
      y: h / 2,
      tx: w / 2,
      ty: h / 2,
      active: false
    };

    const DPR = Math.min(window.devicePixelRatio || 1, 2);

    function resize() {
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * DPR);
      canvas.height = Math.floor(h * DPR);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      cx = w / 2;
      cy = h / 2;
      createStars();
      createFloaters();
    }

    const starCount = () => Math.min(220, Math.max(120, Math.floor((w * h) / 9000)));
    let stars = [];
    let floaters = [];

    function createStars() {
      stars = Array.from({ length: starCount() }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        z: Math.random() * 1 + 0.2,
        r: Math.random() * 1.8 + 0.2,
        speed: Math.random() * 0.35 + 0.03,
        alpha: Math.random() * 0.65 + 0.2,
        tw: Math.random() * Math.PI * 2
      }));
    }

    function createFloaters() {
      floaters = Array.from({ length: 12 }, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 2 + 0.6,
        vx: (Math.random() - 0.5) * 0.16,
        vy: (Math.random() - 0.5) * 0.16,
        a: Math.random() * 0.25 + 0.03
      }));
    }

    function makeTopStars() {
      const count = 18;
      starsTop.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const s = document.createElement('span');
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.animationDuration = 2 + Math.random() * 4 + 's';
        s.style.animationDelay = Math.random() * 3 + 's';
        s.style.opacity = String(0.35 + Math.random() * 0.65);
        starsTop.appendChild(s);
      }
    }

    function drawBackgroundGlow() {
      const g1 = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, Math.max(w, h) * 0.42);
      g1.addColorStop(0, 'rgba(120,180,255,0.10)');
      g1.addColorStop(0.35, 'rgba(120,180,255,0.05)');
      g1.addColorStop(1, 'rgba(120,180,255,0)');
      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, w, h);

      const g2 = ctx.createRadialGradient(w - mouse.x * 0.5, h - mouse.y * 0.5, 0, w - mouse.x * 0.5, h - mouse.y * 0.5, Math.max(w, h) * 0.46);
      g2.addColorStop(0, 'rgba(170,120,255,0.08)');
      g2.addColorStop(0.4, 'rgba(170,120,255,0.04)');
      g2.addColorStop(1, 'rgba(170,120,255,0)');
      ctx.fillStyle = g2;
      ctx.fillRect(0, 0, w, h);
    }

    function drawStars(t) {
      for (const s of stars) {
        s.x -= s.speed * s.z + (mouse.x - cx) * 0.00022 * s.z;
        s.y += (mouse.y - cy) * 0.00012 * s.z;

        if (s.x < -10) s.x = w + 10;
        if (s.y < -10) s.y = h + 10;
        if (s.y > h + 10) s.y = -10;

        const pulse = 0.55 + Math.sin(t * 0.0015 + s.tw) * 0.45;
        const alpha = s.alpha * pulse;

        ctx.beginPath();
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.arc(s.x, s.y, s.r * (0.6 + s.z * 0.65), 0, Math.PI * 2);
        ctx.fill();

        if (s.r > 1.1) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(160,190,255,${alpha * 0.35})`;
          ctx.moveTo(s.x - s.r * 4, s.y);
          ctx.lineTo(s.x + s.r * 4, s.y);
          ctx.moveTo(s.x, s.y - s.r * 4);
          ctx.lineTo(s.x, s.y + s.r * 4);
          ctx.stroke();
        }
      }
    }

    function drawConnections() {
      for (let i = 0; i < floaters.length; i++) {
        const a = floaters[i];
        a.x += a.vx + (mouse.x - cx) * 0.00005;
        a.y += a.vy + (mouse.y - cy) * 0.00005;

        if (a.x < -20) a.x = w + 20;
        if (a.x > w + 20) a.x = -20;
        if (a.y < -20) a.y = h + 20;
        if (a.y > h + 20) a.y = -20;

        for (let j = i + 1; j < floaters.length; j++) {
          const b = floaters[j];
          const dx = a.x - b.x;
          const dy = a.y - b.y;
          const d = Math.hypot(dx, dy);
          if (d < 180) {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(130,160,255,${(1 - d / 180) * 0.08})`;
            ctx.lineWidth = 1;
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }

        const md = Math.hypot(a.x - mouse.x, a.y - mouse.y);
        if (md < 160) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(190,210,255,${(1 - md / 160) * 0.14})`;
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(mouse.x, mouse.y);
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.fillStyle = `rgba(220,235,255,${a.a + 0.2})`;
        ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animate(t) {
      mouse.x += (mouse.tx - mouse.x) * 0.08;
      mouse.y += (mouse.ty - mouse.y) * 0.08;

      ctx.clearRect(0, 0, w, h);
      drawBackgroundGlow();
      drawStars(t);
      drawConnections();

      requestAnimationFrame(animate);
    }

    function updateMouseVars(x, y) {
      const px = (x / window.innerWidth) * 100;
      const py = (y / window.innerHeight) * 100;
      root.style.setProperty('--mx', px + '%');
      root.style.setProperty('--my', py + '%');

      const rx = ((y / window.innerHeight) - 0.5) * -8;
      const ry = ((x / window.innerWidth) - 0.5) * 10;
      panel.style.transform = `perspective(1100px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-2px)`;
      panel.style.boxShadow = `${-ry * 1.1}px ${18 + Math.abs(rx) * 1.4}px 90px rgba(0,0,0,0.45), 0 0 50px rgba(120,180,255,0.12)`;
    }

    window.addEventListener('mousemove', (e) => {
      mouse.tx = e.clientX;
      mouse.ty = e.clientY;
      mouse.active = true;
      updateMouseVars(e.clientX, e.clientY);
    });

    window.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (!t) return;
      mouse.tx = t.clientX;
      mouse.ty = t.clientY;
      updateMouseVars(t.clientX, t.clientY);
    }, { passive: true });

    window.addEventListener('mouseleave', () => {
      mouse.tx = w / 2;
      mouse.ty = h / 2;
      updateMouseVars(w / 2, h / 2);
    });

    window.addEventListener('resize', resize);

    resize();
    makeTopStars();
    updateMouseVars(w / 2, h / 2);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
